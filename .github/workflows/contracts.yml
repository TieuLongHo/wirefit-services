# Contract gate for every service in this repo: PRs are checked against the
# contracts repo, pushes to main also publish. Jobs run sequentially so the
# provider's IR lands before its consumers check, and so publishes never push
# to the contracts repo concurrently.
#
# Workarounds around Wirefit/wirefit/actions/check@master:
#  - the action go-installs wirefit but does not put GOPATH/bin on PATH for
#    its later steps, so a pre-step adds it
#  - the action resolves schema/dto paths from the workspace root (it has no
#    --project input), so each job flattens its service dir to the root first
#  - `wirefit publish` git-commits in the contracts-repo clone, which has no
#    identity on a fresh runner, so a global one is set up front
name: contracts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  inventory-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          git config --global user.name "wirefit-bot"
          git config --global user.email "wirefit-bot@users.noreply.github.com"
          cp -r inventory-service/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  web-store:
    needs: inventory-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          git config --global user.name "wirefit-bot"
          git config --global user.email "wirefit-bot@users.noreply.github.com"
          cp -r web-store/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  web-app-ts:
    needs: order-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          git config --global user.name "wirefit-bot"
          git config --global user.email "wirefit-bot@users.noreply.github.com"
          cp -r web-app-ts/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  order-service:
    needs: web-store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          git config --global user.name "wirefit-bot"
          git config --global user.email "wirefit-bot@users.noreply.github.com"
          cp -r order-service/. .
          mvn -q -DskipTests compile
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  fulfillment-service:
    needs: web-app-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          git config --global user.name "wirefit-bot"
          git config --global user.email "wirefit-bot@users.noreply.github.com"
          cp -r fulfillment-service/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  notification-service:
    needs: fulfillment-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          git config --global user.name "wirefit-bot"
          git config --global user.email "wirefit-bot@users.noreply.github.com"
          go install github.com/wirefit/wirefit/cmd/wirefit-py@master
          python -m venv .venv
          .venv/bin/pip install "pydantic>=2,<3"
          cp -r notification-service/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master
