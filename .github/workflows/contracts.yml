# Contract gate for every service in this repo: PRs are checked against the
# contracts repo, pushes to main also publish. Jobs run sequentially so the
# provider's IR lands before its consumers check, and so publishes never push
# to the contracts repo concurrently.
#
# Two workarounds around Wirefit/wirefit/actions/check@master:
#  - the action go-installs wirefit but does not put GOPATH/bin on PATH for
#    its later steps, so a pre-step adds it
#  - the action resolves schema/dto paths from the workspace root (it has no
#    --project input), so each job flattens its service dir to the root first
name: contracts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  inventory-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          cp -r inventory-service/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  web-store:
    needs: inventory-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          cp -r web-store/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master

  web-app-ts:
    needs: web-store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          cp -r web-app-ts/. .
      - uses: Wirefit/wirefit/actions/check@master
        with:
          manifest: contracts.yaml
          contracts-repo: TieuLongHo/wirefit-contracts
          token: ${{ secrets.CONTRACTS_REPO_TOKEN }}
          version: master
